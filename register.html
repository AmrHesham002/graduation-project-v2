<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMS - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body data-role="client" class="auth-page px-3 vms-app">
    <div class="theme-toggle position-absolute top-0 end-0 p-4">
        <button id="themeSwitch" class="btn btn-outline-primary rounded-circle shadow-sm"><i class="bi bi-moon-stars"></i></button>
    </div>
    <div class="container d-flex justify-content-center align-items-center">
        <div class="col-md-8 col-lg-6">
            <div class="card auth-card shadow-lg border-0 rounded-4 fade-in">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-car-front-fill text-primary" style="font-size: 3rem;"></i>
                        <h3 class="fw-bold mt-2">Create an Account</h3>
                        <p class="text-muted">Join VMS Portal today</p>
                    </div>
                    <form id="registerForm">
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control form-control-lg" placeholder="John" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control form-control-lg" placeholder="Doe" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email address</label>
                            <input type="email" class="form-control form-control-lg" placeholder="name@example.com" required>
                        </div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control form-control-lg" placeholder="Create password" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Confirm Password</label>
                                <input type="password" class="form-control form-control-lg" placeholder="Confirm password" required>
                            </div>
                        </div>
                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input" id="terms" required>
                            <label class="form-check-label text-muted small" for="terms">I agree to the <a href="#" class="text-decoration-none">Terms of Service</a> and <a href="#" class="text-decoration-none">Privacy Policy</a></label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg mb-3 shadow-sm">Register</button>
                        <div class="text-center">
                            <span class="text-muted">Already have an account?</span>
                            <a href="login.html" class="text-decoration-none fw-semibold">Sign in here</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
