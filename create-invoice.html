<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMS - Create Invoice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <nav class="sidebar">
        <!-- Sidebar logic -->
        <div class="brand"><i class="bi bi-cash-stack text-primary"></i> VMS Finance</div>
        <div class="sidebar-heading">Accounting</div>
        <ul class="sidebar-menu">
            <li><a href="../dashboards/finance-manager.html"><i class="bi bi-wallet2"></i> Dashboard</a></li>
            <li><a href="invoice-list.html"><i class="bi bi-receipt"></i> Invoices</a></li>
            <li class="active"><a href="create-invoice.html"><i class="bi bi-plus-circle"></i> Create Invoice</a></li>
            <li><a href="financial-report.html"><i class="bi bi-file-earmark-bar-graph"></i> Reports</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header class="topbar">
            <h5 class="mb-0 fw-bold ms-3">Generate New Invoice</h5>
        </header>
        <div class="container p-4 fade-in">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-5">
                    <form action="invoice-list.html">
                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <h6 class="fw-bold mb-3">Client Information</h6>
                                <div class="mb-3">
                                    <label class="form-label">Search Client / Work Order</label>
                                    <input type="text" class="form-control" placeholder="WO-4592 - John Doe" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Billing Address</label>
                                    <textarea class="form-control" rows="3" placeholder="123 Main St..."
                                        readonly>123 Fake St, Cityville, ST 12345</textarea>
                                </div>
                            </div>
                            <div class="col-md-6 text-md-end">
                                <h2 class="fw-bold text-muted mb-0">INV-1005</h2>
                                <p class="text-muted">Draft</p>
                                <div class="mt-4 text-start d-inline-block">
                                    <label class="form-label">Issue Date</label>
                                    <input type="date" class="form-control mb-2" required>
                                    <label class="form-label">Due Date</label>
                                    <input type="date" class="form-control" required>
                                </div>
                            </div>
                        </div>
                        <h6 class="fw-bold mb-3">Line Items</h6>
                        <table class="table border align-middle mb-4">
                            <thead class="table-light">
                                <tr>
                                    <th width="50%">Description</th>
                                    <th>Qty</th>
                                    <th>Rate</th>
                                    <th class="text-end">Amount</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><input type="text" class="form-control" value="Engine Diagnostics" required>
                                    </td>
                                    <td><input type="number" class="form-control" value="1" required></td>
                                    <td><input type="number" class="form-control" value="120" required></td>
                                    <td class="text-end fw-bold">$120.00</td>
                                </tr>
                                <tr>
                                    <td><input type="text" class="form-control" value="Spark Plugs" required></td>
                                    <td><input type="number" class="form-control" value="4" required></td>
                                    <td><input type="number" class="form-control" value="12" required></td>
                                    <td class="text-end fw-bold">$48.00</td>
                                </tr>
                            </tbody>
                        </table>
                        <button type="button" class="btn btn-outline-primary btn-sm mb-4">+ Add Item</button>
                        <div class="row">
                            <div class="col-md-6 offset-md-6">
                                <div class="d-flex justify-content-between mb-2">
                                    <span>Subtotal</span><span>$168.00</span></div>
                                <div class="d-flex justify-content-between mb-2"><span>Tax
                                        (10%)</span><span>$16.80</span></div>
                                <hr>
                                <div class="d-flex justify-content-between mb-4"><span
                                        class="fw-bold fs-5">Total</span><span class="fw-bold fs-5">$184.80</span></div>
                                <button type="submit" class="btn btn-primary w-100 btn-lg shadow-sm">Save & Send
                                    Invoice</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
