<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMS - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login-glass.css">
</head>

<body data-role="admin" class="auth-page px-3 vms-app">
    <div class="theme-toggle position-absolute top-0 end-0 p-4">
        <button id="themeSwitch" class="btn btn-outline-primary rounded-circle shadow-sm"><i
                class="bi bi-moon-stars"></i></button>
    </div>
    <div class="container py-4 d-flex justify-content-center align-items-center">
        <div class="col-md-6 col-lg-4">
            <div class="card auth-card shadow-lg border-0 rounded-4 fade-in">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-car-front-fill"></i>
                        <h3 class="fw-bold mt-2">VMS Portal</h3>
                        <p class="text-muted">Sign in to your account</p>
                    </div>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Email address</label>
                            <input type="email" class="form-control form-control-lg" placeholder="name@example.com"
                                value="admin@vms.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label d-flex justify-content-between w-100">
                                Password
                                <a href="forgot-password.html" class="text-decoration-none text-primary small">Forgot
                                    password?</a>
                            </label>
                            <input type="password" class="form-control form-control-lg" placeholder="Enter password"
                                value="password" required>
                        </div>
                        <div class="mb-4">
    <label class="form-label">Role (Demo)</label>
    <select class="form-select form-select-lg" id="roleSelect" required>
        <option value="admin">Admin</option>
        <option value="client">Client</option>
        <option value="technician">Technician</option>
        <option value="service-manager">Service Manager</option>
        <option value="general-manager">General Manager</option>
        <option value="stock-keeper">Stock Keeper</option>
        <option value="finance-manager">Finance Manager</option>
        <option value="data-analyst">Data Analyst</option>
    </select>
</div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg mb-3 shadow-sm">Sign In</button>
                        <div class="text-center">
                            <span class="text-muted">Don't have an account?</span>
                            <a href="register.html" class="text-decoration-none fw-semibold">Register here</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
