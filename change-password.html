<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMS - Change Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="auth-page px-3">
    <div class="theme-toggle position-absolute top-0 end-0 p-4">
        <button id="themeSwitch" class="btn btn-outline-primary rounded-circle shadow-sm"><i
                class="bi bi-moon-stars"></i></button>
    </div>
    <div class="container py-4 d-flex justify-content-center align-items-center">
        <div class="col-md-6 col-lg-4">
            <div class="card auth-card shadow-lg border-0 rounded-4 fade-in">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-key-fill text-primary" style="font-size: 3rem;"></i>
                        <h3 class="fw-bold mt-2">New Password</h3>
                        <p class="text-muted">Create a new secure password</p>
                    </div>
                    <form action="login.html">
                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" class="form-control form-control-lg" placeholder="Enter new password"
                                required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" class="form-control form-control-lg"
                                placeholder="Confirm new password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg mb-3 shadow-sm">Update
                            Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
